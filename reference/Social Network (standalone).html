document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"258a38df-6c30-4917-9537-36855d4903fa\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root{--bg:#f4f2ee;--surface:#fdfdfb;--surface2:#ecebe5;--text:#1f1e1b;--text2:#605d55;--text3:#9b9789;--border:rgba(31,30,27,.09);--accent:#5661d8;--soft:color-mix(in oklab,var(--accent) 11%,transparent);--soft2:color-mix(in oklab,var(--accent) 20%,transparent);--danger:#c94f5f;--r:18px;--shadow:0 1px 2px rgba(30,28,24,.04),0 10px 30px -18px rgba(30,28,24,.18)}\nhtml[data-theme=\"dark\"]{--bg:#131311;--surface:#1d1c19;--surface2:#292722;--text:#eceae3;--text2:#a8a498;--text3:#7b776c;--border:rgba(236,234,227,.09);--shadow:0 1px 2px rgba(0,0,0,.25),0 12px 34px -18px rgba(0,0,0,.5)}\nhtml{background:var(--bg)}\nbody{margin:0;background:var(--bg);color:var(--text);font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased}\n*{box-sizing:border-box}\ninput,textarea,button{font-family:'Manrope',system-ui,sans-serif}\ntextarea{resize:none}\ninput::placeholder,textarea::placeholder{color:var(--text3)}\n::view-transition-old(root){animation:none}\n::view-transition-new(root){animation:vt .55s cubic-bezier(.4,0,.2,1)}\n@keyframes vt{from{clip-path:circle(0px at var(--vt-x,90vw) var(--vt-y,10vh))}to{clip-path:circle(150vmax at var(--vt-x,90vw) var(--vt-y,10vh))}}\n@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n@keyframes screenIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}\n@keyframes pop{0%{transform:scale(.3)}55%{transform:scale(1.35)}100%{transform:scale(1)}}\n@keyframes shimme      const u = USERS[uid];\n      const on = !!s.invited[g.id + ':' + uid];\n      return {\n        label: on ? u.name.split(' ')[0] + ' · invited ✓' : u.name.split(' ')[0],\n        initials: u.initials, color: u.color,\n        bg: on ? 'var(--soft)' : 'transparent',\n        bd: on ? 'var(--accent)' : 'var(--border)',\n        tc: on ? 'var(--accent)' : 'var(--text2)',\n        toggle: () => this.setState({ invited: Object.assign({}, s.invited, { [g.id + ':' + uid]: !on }) })\n      };\n    });\n\n    // chat\n    const convoMeta = (c) => {\n      if (c.kind === 'dm') { const u = USERS[c.uid]; return { title: u.name, initials: u.initials, color: u.color, sub: c.online ? 'Online now' : 'Active recently' }; }\n      const gr = s.groups.find(x => x.id === c.gid);\n      return { title: gr.name, initials: gr.name.split(' ').map(w => w[0]).slice(0, 2).join(''), color: gr.color, sub: gr.members + ' members · group chat' };\n    };\n    const convos = s.convos.map(c => {\n      const m = convoMeta(c);\n      const last = c.messages[c.messages.length - 1];\n      return {\n        title: m.title, initials: m.initials, color: m.color,\n        preview: (last.from === 'me' ? 'You: ' : '') + last.text,\n        previewColor: c.unread > 0 ? 'var(--text)' : 'var(--text3)',\n        previewW: c.unread > 0 ? '700' : '500',\n        time: last.time,\n        online: !!c.online,\n        hasUnread: c.unread > 0, unread: num(c.unread),\n        bg: c.id === s.convoId ? 'var(--soft)' : 'transparent',\n        open: () => this.openConvo(c.id)\n      };\n    });\n    const active = s.convos.find(c => c.id === s.convoId) || s.convos[0];\n    const am = convoMeta(active);\n    const messages = active.messages.map((msg, i) => {\n      const prev = active.messages[i - 1];\n      return {\n        text: msg.text, time: msg.time,\n        mine: msg.from === 'me', theirs: msg.from !== 'me',\n        user: USERS[msg.from] || USERS.me,\n        showName: active.kind === 'group' && msg.from ! const railEvents = [];\n    s.groups.forEach(gr => { if (gr.state === 'joined') gr.events.forEach(ev => railEvents.push({ title: ev.title, day: ev.day, mon: ev.mon, group: gr.name, open: () => this.setState({ screen: 'group', groupId: gr.id, groupTab: 'events' }) })); });\n\n    const authTabs = [\n      { k: 'login', label: 'Sign in' },\n      { k: 'register', label: 'Create account' }\n    ].map(t => ({\n      label: t.label,\n      bg: s.authMode === t.k ? 'var(--surface)' : 'transparent',\n      color: s.authMode === t.k ? 'var(--text)' : 'var(--text3)',\n      sh: s.authMode === t.k ? 'var(--shadow)' : 'none',\n      pick: () => this.setState({ authMode: t.k })\n    }));\n\n    return {\n      // shell\n      isAuth: s.screen === 'auth', isApp: s.screen !== 'auth',\n      isFeed: s.screen === 'feed', isProfile: s.screen === 'profile', isGroups: s.screen === 'groups',\n      isGroup: s.screen === 'group', isChat: s.screen === 'chat', isNotifs: s.screen === 'notifications',\n      rightRail: ['feed', 'profile', 'groups', 'notifications'].indexOf(s.screen) >= 0,\n      navItems, me,\n      themeIcon: s.theme === 'light' ? IC.moon : IC.sun,\n      themeLabel: s.theme === 'light' ? 'Dark mode' : 'Light mode',\n      toggleTheme: this.toggleTheme,\n      goHome: () => this.go('feed'),\n      goMyProfile: () => this.openProfile('me'),\n      goLogout: () => this.go('auth'),\n      // auth\n      authTabs, authIsLogin: s.authMode === 'login', authIsReg: s.authMode === 'register',\n      authCta: s.authMode === 'login' ? 'Sign in' : 'Create account',\n      submitAuth: () => this.go('feed'),\n      // feed\n      feedLoading: s.feedLoading, feedReady: !s.feedLoading,\n      posts: feedPosts,\n      composerText: s.composerText,\n      onComposer: (e) => this.setState({ composerText: e.target.value }),\n      composerImg: s.composerImg,\n      toggleComposerImg: () => this.setState({ composerImg: !s.composerImg }),\n      removeComposerImg: () => this.setState({ composer
